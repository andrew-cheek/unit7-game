    <!-- Google Analytics (hostname-aware: game vs main site) -->
    <script>
      (function () {
          var GAME_ID = 'G-68V3G2JBXV';
          var MAIN_ID = 'G-RCCCLCQX95';
          var isGame = (window.location.hostname === 'unit7.humanoidrobots.com');
          var id = isGame ? GAME_ID : MAIN_ID;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          window.gtag = function () { window.dataLayer.push(arguments); };
          window.gtag('js', new Date());
          // COPPA hardening for the kids' GAME host ONLY (reversible: delete this
          // `if` block to restore default behavior). The main marketing site
          // (MAIN_ID) is intentionally left untouched. We keep basic, non-ad
          // analytics (analytics_storage granted) but switch OFF everything that
          // builds an advertising / cross-device profile of a child:
          //   - Consent Mode denies ad storage, ad user-data and ad personalization.
          //   - Google Signals + ad-personalization signals disabled at config.
          //   - Restricted Data Processing on; IPs anonymized.
          var cfg = { send_page_view: true };
          if (isGame) {
              window.gtag('consent', 'default', {
                  ad_storage: 'denied',
                  ad_user_data: 'denied',
                  ad_personalization: 'denied',
                  analytics_storage: 'granted'
              });
              window.gtag('set', 'allow_ad_personalization_signals', false);
              cfg.allow_google_signals = false;
              cfg.allow_ad_personalization_signals = false;
              cfg.restricted_data_processing = true;
              cfg.anonymize_ip = true;
          }
          window.gtag('config', id, cfg);
      })();
    </script>
